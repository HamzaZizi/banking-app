server {
    listen 9090;
    server_name _;

    # Downstream Payments Fraud Check API. Serves a canned decision as JSON.
    location = /fraud-check {
        default_type application/json;
        alias /usr/share/nginx/html/fraud.json;
    }

    # Health endpoint for probes.
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
