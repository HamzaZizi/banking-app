# Resource name is prefixed with the environment (dev/sit/staging/prod) so names
# are self-describing across namespaces, e.g. dev-banking-app-backend. The frontend
# Ingress routes /api to this exact name (also prefixed with <+env.name>).
name: <+env.name.toLowerCase()>-<+service.name>
# Replica count is a service variable (base default "2") so a Harness environment
# service override can raise it per-env WITHOUT editing this file again — Prod
# overrides it to "5" for the canary/CV stage. Harness resolves this expression
# in the values file at deploy time, before Helm templating.
replicas: <+serviceVariables.replicas>

image: <+artifact.image>
# dockercfg: <+artifact.imagePullSecret>

createNamespace: true
namespace: <+infra.namespace>

# ClusterIP is right for the backend: only the frontend (and ingress, if used)
# needs to reach it, it doesn't need its own public endpoint.
serviceType: ClusterIP
servicePort: 8080
serviceTargetPort: 8080

# Liveness/readiness paths, exposed via Spring Boot Actuator.
livenessPath: /actuator/health/liveness
readinessPath: /actuator/health/readiness

# Requests are what the scheduler reserves — set them realistically so replicas
# get their own node headroom instead of contending. Limits give burst room; the
# JVM-backed backend gets more memory than the static-nginx frontend.
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Config goes into a ConfigMap, secrets into a Secret. Both are mounted into
# the container via envFrom, so changing these doesn't require a new image
# or a new artifact from Harness, just a redeploy of this Service.
env:
  config:
    CORS_ALLOWED_ORIGINS: "*"
    # Downstream Payments Fraud Check service, reachable in-namespace. Same name in
    # every env (fraud-check is applied per namespace via fraud-check-service/k8s-fraud-check.yaml).
    DOWNSTREAM_URL: "http://fraud-check:9090"
  secrets: {}
