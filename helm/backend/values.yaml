# Resource name = the Harness Service name (e.g. ci-banking-backend), so K8s
# names are stable and predictable across environments. The frontend Ingress
# routes /api to a Service called ci-banking-backend, so this must resolve to that.
name: <+service.name>
replicas: 2

image: <+artifact.image>
# dockercfg: <+artifact.imagePullSecret>

createNamespace: true
namespace: <+infra.namespace>

# ClusterIP is right for the backend: only the frontend (and ingress, if used)
# needs to reach it, it doesn't need its own public endpoint.
serviceType: ClusterIP
servicePort: 8080
serviceTargetPort: 8080

# Liveness/readiness paths, exposed via Spring Boot Actuator.
livenessPath: /actuator/health/liveness
readinessPath: /actuator/health/readiness

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Config goes into a ConfigMap, secrets into a Secret. Both are mounted into
# the container via envFrom, so changing these doesn't require a new image
# or a new artifact from Harness, just a redeploy of this Service.
env:
  config:
    CORS_ALLOWED_ORIGINS: "*"
  secrets: {}
