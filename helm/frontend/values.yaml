# Resource name is prefixed with the environment (dev/sit/staging/prod) so names
# are self-describing across namespaces, e.g. dev-banking-app-frontend.
name: <+env.name.toLowerCase()>-<+service.name>
replicas: 2

image: <+artifact.image>
# dockercfg: <+artifact.imagePullSecret>

createNamespace: true
namespace: <+infra.namespace>

# ClusterIP: the shared ALB (via Ingress) is the only public entry point now,
# so the frontend Service just needs to be reachable in-cluster by the ALB.
serviceType: ClusterIP
servicePort: 80
serviceTargetPort: 8081

# Ingress -> EKS Auto Mode provisions a single ALB from this. Path-based routing:
#   /api  -> backend Service    (so the browser hits the backend on the same host)
#   /     -> this frontend Service
# Both apps share one hostname => same origin => no CORS.
ingress:
  enabled: true
  className: eks-alb
  # internet-facing ALB with IP target type (required for EKS Auto Mode / Bottlerocket).
  # Subnets are pinned explicitly because this VPC is shared with another cluster:
  # auto-discovery finds subnets tagged for the other cluster and refuses them, so we
  # name the public subnets (MapPublicIpOnLaunch=true) directly instead.
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/subnets: subnet-1e0cf064,subnet-5fa7a512,subnet-dfbb05b6
  # Name + port of the backend Service the /api route points at. Must match the
  # backend's prefixed resource name (<+env.name>-<+service.name>), e.g.
  # dev-banking-app-backend. Same env, so <+env.name> resolves identically here.
  backendServiceName: <+env.name.toLowerCase()>-banking-app-backend
  backendServicePort: 8080

livenessPath: /healthz
readinessPath: /healthz

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# API_BASE_URL gets baked into config.js at container start (see docker-entrypoint.sh).
# Empty string = same origin: the browser calls /api/... on the same ALB host that
# served the page, so the backend is reached via the Ingress /api route with no CORS
# and no need for a browser-resolvable backend hostname.
env:
  config:
    API_BASE_URL: ""
  secrets: {}
