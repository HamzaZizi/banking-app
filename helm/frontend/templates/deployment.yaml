apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
    component: frontend
spec:
  replicas: {{ .Values.replicas }}
  # Surge a new pod up BEFORE tearing an old one down: zero-downtime rollout and
  # no "waiting on the last replica" stall. maxUnavailable:0 keeps full capacity
  # during the roll; maxSurge:1 caps the extra load to one pod at a time.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        component: frontend
    spec:
      # Spread replicas across nodes so one hot node can't starve every replica
      # (the staging incident: both pods landed on a 96%-CPU node and their
      # /healthz probes timed out). Also means a single node loss / chaos node-kill
      # can't take the whole Service down. ScheduleAnyway = never block a deploy
      # if the cluster is temporarily lopsided.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ .Values.name }}
      containers:
        - name: frontend
          image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.serviceTargetPort }}
          envFrom:
            - configMapRef:
                name: {{ .Values.name }}-config
            - secretRef:
                name: {{ .Values.name }}-secrets
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessPath }}
              port: {{ .Values.serviceTargetPort }}
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessPath }}
              port: {{ .Values.serviceTargetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
