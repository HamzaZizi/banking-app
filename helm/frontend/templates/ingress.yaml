{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
    component: frontend
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          # /api first: the ALB evaluates paths in order, so API traffic is
          # routed to the backend before the catch-all frontend rule.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.backendServiceName }}
                port:
                  number: {{ .Values.ingress.backendServicePort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.name }}
                port:
                  number: {{ .Values.servicePort }}
{{- end }}
