server {
    listen 9090;
    server_name _;

    # Downstream FX Rates API. Serves canned rates as application/json.
    location = /rates {
        default_type application/json;
        alias /usr/share/nginx/html/rates.json;
    }

    # Health endpoint for probes.
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
