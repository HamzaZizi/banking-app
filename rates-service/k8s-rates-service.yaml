# Downstream "FX Rates" service - the backend's immediate external dependency.
# Plain manifest applied directly to each env namespace (no image build needed):
# uses stock nginx:alpine with the rates JSON + server config mounted from a ConfigMap.
#
# Apply into each namespace, e.g.:
#   kubectl apply -n banking-app-dev     -f k8s-rates-service.yaml
#   kubectl apply -n banking-app-sit     -f k8s-rates-service.yaml
#   kubectl apply -n banking-app-staging -f k8s-rates-service.yaml
#   kubectl apply -n banking-app-prod    -f k8s-rates-service.yaml
#
# The backend reaches it in-namespace at:  http://rates-service:9090
apiVersion: v1
kind: ConfigMap
metadata:
  name: rates-service-content
data:
  rates.json: |
    {
      "base": "GBP",
      "asOf": "2026-07-17T00:00:00Z",
      "rates": { "USD": 1.28, "EUR": 1.17, "JPY": 199.42, "CHF": 1.12 }
    }
  default.conf: |
    server {
        listen 9090;
        server_name _;
        location = /rates {
            default_type application/json;
            alias /usr/share/nginx/html/rates.json;
        }
        location = /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rates-service
  labels:
    app: rates-service
    component: downstream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rates-service
  template:
    metadata:
      labels:
        app: rates-service
        component: downstream
    spec:
      containers:
        - name: rates-service
          image: nginx:1.27-alpine
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html/rates.json
              subPath: rates.json
            - name: content
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: content
          configMap:
            name: rates-service-content
---
apiVersion: v1
kind: Service
metadata:
  name: rates-service
  labels:
    app: rates-service
spec:
  type: ClusterIP
  selector:
    app: rates-service
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
