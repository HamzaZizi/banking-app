<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C&amp;I Banking | Online Banking</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <span class="brand-mark">C&amp;I</span>
                <span class="brand-name">Banking</span>
            </div>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="accounts">Accounts</button>
                <button class="tab-btn" data-tab="mortgages">Mortgages</button>
            </nav>
            <div class="user-chip">Hello, Alex Morgan</div>
        </div>
    </header>

    <main class="content">
        <section class="summary-cards" id="summary-cards">
            <div class="card summary-card">
                <div class="summary-label">Total balance</div>
                <div class="summary-value" id="summary-total-balance">--</div>
            </div>
            <div class="card summary-card">
                <div class="summary-label">Accounts</div>
                <div class="summary-value" id="summary-account-count">--</div>
            </div>
            <div class="card summary-card">
                <div class="summary-label">Mortgage balance</div>
                <div class="summary-value" id="summary-mortgage-balance">--</div>
            </div>
        </section>

        <section id="accounts-panel" class="panel active">
            <h2>Your accounts</h2>
            <div id="accounts-list" class="card-grid"></div>
        </section>

        <section id="mortgages-panel" class="panel">
            <h2>Your mortgages</h2>
            <div id="mortgages-list" class="card-grid"></div>
        </section>
    </main>

    <footer class="footer">
        <p>C&amp;I Banking is a fictional demo application built for illustrative purposes only. No real account data.</p>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
