server {
    listen 8081;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Demo app: always revalidate so a new deploy is picked up immediately
        # instead of serving a stale index.html / styles.css / app.js from cache.
        add_header Cache-Control "no-cache";
    }

    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
