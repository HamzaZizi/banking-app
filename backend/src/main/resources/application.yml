server:
  port: 8080

spring:
  application:
    name: ci-banking-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      # Tag every metric with the app name so Prometheus/CV can filter per service.
      application: ci-banking-backend
  distribution:
    # Emit latency histograms + p95/p99 for HTTP requests, which chaos APM probes
    # and Continuous Verification query for SLA analysis.
    percentiles-histogram:
      http.server.requests: true
    percentiles:
      http.server.requests: 0.95, 0.99

cibanking:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# Downstream Payments Fraud Check service (the app's immediate integration). URL
# is set per environment via the DOWNSTREAM_URL env var; falls back to localhost.
downstream:
  fraudcheck:
    url: ${DOWNSTREAM_URL:http://localhost:9090}
