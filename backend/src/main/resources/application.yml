server:
  port: 8080

spring:
  application:
    name: ci-banking-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      # Tag every metric with the app name so Prometheus/CV can filter per service.
      application: ci-banking-backend
  distribution:
    # Emit latency histograms + p95/p99 for HTTP requests, which chaos APM probes
    # and Continuous Verification query for SLA analysis.
    percentiles-histogram:
      http.server.requests: true
    percentiles:
      http.server.requests: 0.95, 0.99

cibanking:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  # Boot-time self warm-up (see WarmupRunner). Warms the hot read endpoints
  # before the readiness probe flips UP, so a Prod canary is already warm when
  # Continuous Verification starts measuring — kills cold-start false positives
  # on "Average Response Time" without hiding the /api/summary memory leak.
  warmup:
    enabled: ${WARMUP_ENABLED:true}
    rounds: ${WARMUP_ROUNDS:200}
    max-seconds: ${WARMUP_MAX_SECONDS:60}
    summary-every: ${WARMUP_SUMMARY_EVERY:4}
  # Regulatory compliance retention (see BankingService.getSummary). The
  # retained footprint is BOUNDED on purpose: it holds the heap at a sustained,
  # elevated level under load — heavy GC + higher response time versus the lean
  # baseline — so a Prod canary carrying this regression fails Continuous
  # Verification on a GRACEFUL memory/latency trend. Because it is capped it can
  # never exhaust the 512m heap and OOM-restart the pod (which would turn the CV
  # verdict into a crude container-restart alert instead of the intended
  # gradual-degradation signal). Tune max-retained-mb to make CV fail harder
  # (higher, toward the 512m heap) or softer (lower); keep a safe margin.
  compliance:
    retain-enabled: ${COMPLIANCE_RETAIN_ENABLED:true}
    statement-bytes: ${COMPLIANCE_STATEMENT_BYTES:65536}
    max-retained-mb: ${COMPLIANCE_MAX_RETAINED_MB:250}

# Downstream Payments Fraud Check service (the app's immediate integration). URL
# is set per environment via the DOWNSTREAM_URL env var; falls back to localhost.
downstream:
  fraudcheck:
    url: ${DOWNSTREAM_URL:http://localhost:9090}
