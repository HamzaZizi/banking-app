server:
  port: 8080

spring:
  application:
    name: ci-banking-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      # Tag every metric with the app name so Prometheus/CV can filter per service.
      application: ci-banking-backend
  distribution:
    # Emit latency histograms + p95/p99 for HTTP requests, which chaos APM probes
    # and Continuous Verification query for SLA analysis.
    percentiles-histogram:
      http.server.requests: true
    percentiles:
      http.server.requests: 0.95, 0.99

cibanking:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  # Boot-time self warm-up (see WarmupRunner). Warms the hot read endpoints
  # before the readiness probe flips UP, so the pod only takes traffic once it
  # is warm — removes the cold-start spike in "Average Response Time" that would
  # otherwise skew dashboards and latency-based release gates on a new pod.
  warmup:
    enabled: ${WARMUP_ENABLED:true}
    rounds: ${WARMUP_ROUNDS:200}
    max-seconds: ${WARMUP_MAX_SECONDS:60}
    summary-every: ${WARMUP_SUMMARY_EVERY:4}
  # Regulatory audit retention (see BankingService.getSummary). Each summary
  # view is snapshotted for FCA transaction-reporting and dispute resolution and
  # retained in memory so lookups avoid a round-trip to cold storage. The
  # retained set is capped by max-retained-mb; older snapshots are evicted once
  # the budget is reached.
  compliance:
    retain-enabled: ${COMPLIANCE_RETAIN_ENABLED:true}
    statement-bytes: ${COMPLIANCE_STATEMENT_BYTES:65536}
    max-retained-mb: ${COMPLIANCE_MAX_RETAINED_MB:250}
    # Budget (ms) for the synchronous flush of each summary view to the durable
    # regulatory audit ledger. The flush blocks on the downstream ledger and
    # scales with the retained batch, from 0 (empty) up to this cap (full).
    # 0 flushes asynchronously.
    audit-ledger-flush-ms: ${COMPLIANCE_AUDIT_LEDGER_FLUSH_MS:300}

# Downstream Payments Fraud Check service (the app's immediate integration). URL
# is set per environment via the DOWNSTREAM_URL env var; falls back to localhost.
downstream:
  fraudcheck:
    url: ${DOWNSTREAM_URL:http://localhost:9090}
