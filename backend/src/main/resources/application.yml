server:
  port: 8080

spring:
  application:
    name: ci-banking-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

cibanking:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# Downstream FX Rates service (the app's immediate integration). URL is set per
# environment via the DOWNSTREAM_URL env var; falls back to localhost for dev.
downstream:
  rates:
    url: ${DOWNSTREAM_URL:http://localhost:9090}
