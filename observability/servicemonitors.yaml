---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: banking-app-backend
  namespace: banking-app-prod
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames: [banking-app-prod]
  selector:
    matchLabels:
      component: backend
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
